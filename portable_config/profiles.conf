### Conditional Profiles ###

# HDR passthrough for a 1440p HDR-capable display.
# Adjust display_width/display_height to match your monitor resolution if different.
[HDR]
profile-desc=HDR passthrough (PQ BT.2020 → 1440p display)
profile-cond=(p["video-params/primaries"] == "bt.2020") and (p["video-params/gamma"] == "pq") and display_width == 2560 and display_height == 1440
target-trc=pq
dither-depth=10
target-peak=1156
target-prim=bt.2020
target-contrast=4000
hdr-compute-peak=yes
video-output-levels=full
target-colorspace-hint=yes      # required for Wayland HDR color management (wp-color-management-v1)

