<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- ~/.config/mpv/fonts.conf
     mpv-specific fontconfig for libass subtitle rendering.
     Linux only — all Windows-specific entries removed.
-->
<fontconfig>

  <!-- System font directories -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>

  <!-- User font directories (XDG and legacy) -->
  <dir prefix="xdg">fonts</dir>
  <!-- ~/.local/share/fonts is the modern XDG standard location -->
  <dir>~/.local/share/fonts</dir>
  <!-- ~/.fonts kept for compatibility with older setups -->
  <dir>~/.fonts</dir>

  <!-- Accept deprecated 'mono' alias → 'monospace' -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>mono</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>monospace</string>
    </edit>
  </match>

  <!-- Accept alternate 'sans serif' spelling → 'sans-serif' -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>sans serif</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>

  <!-- Accept deprecated 'sans' alias → 'sans-serif' -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>sans</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>

  <!-- Accept alternate 'system ui' spelling → 'system-ui' -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>system ui</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>system-ui</string>
    </edit>
  </match>

  <!-- Load local system customization file if present -->
  <include ignore_missing="yes">conf.d</include>

  <!-- Font cache (XDG standard: ~/.cache/fontconfig) -->
  <cachedir prefix="xdg">fontconfig</cachedir>

  <config>
    <!-- Rescan font directories every 30 seconds -->
    <rescan>
      <int>30</int>
    </rescan>
  </config>

</fontconfig>
