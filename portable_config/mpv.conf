### Profile ###

include="~~/profiles.conf"

### Video Output ###

vo=gpu-next                     # libplacebo renderer; default since mpv 0.41
gpu-api=vulkan                  # Vulkan preferred on Wayland; mpv 0.41 now prefers Vulkan Video HW decode
gpu-context=auto                # auto-picks waylandvk on Hyprland/Wayland
hwdec=auto                      # mpv 0.41: prefers Vulkan Video, falls back to VA-API automatically
vd-lavc-dr=yes                  # direct rendering; reduces CPU-GPU copies

### Scaling & Quality (libplacebo) ###

scale=spline36                  # high-quality luma upscaling; good balance of sharpness/artifact
dscale=mitchell                 # luma downscaling; smooth without ringing
cscale=spline36                 # chroma upscaling; matches luma quality
scale-antiring=0.7              # reduce ringing on luma upscale (libplacebo native AR)
sigmoid-upscaling=yes           # sigmoidize before upscaling; reduces haloing on sharp edges
correct-downscaling=yes         # anti-aliasing when downscaling
linear-downscaling=yes          # linear-light downscaling for accuracy

### Dithering ###

dither-depth=auto               # match output bit-depth; prevents banding on 8-bit displays
temporal-dither=yes             # dither across frames; smoother gradient transitions

### Debanding ###

deband=no                       # off by default; profiles or ALT+d toggle it per file
deband-iterations=1
deband-threshold=48
deband-range=16
deband-grain=32

### Interpolation (off by default; toggle with 'g') ###

video-sync=display-resample     # needed for both smooth playback and interpolation
interpolation=no                # toggle per-file with 'g'; avoids judder on 24p displays
tscale=oversample               # best low-artifact tscale for gpu-next; use when interpolation=yes

### Subtitles ###

slang=en,eng,English
alang=ja,jp,jpn,jap,Japanese,en,eng,English

sub-blur=0.5                    # Gaussian blur for soft subs (sub-gauss does not exist; removed)
sub-scale=0.7
sub-margin-y=60
sub-color='#eceff4'
sub-shadow-offset=0
sub-outline-size=1.15
sub-font=Clear Sans Bold
sub-back-color='#2e3440'
sub-border-color='#2e3440'
sub-shadow-color='#2e3440'
sub-outline-color='#2e3440'

sub-auto=all
sub-fix-timing=yes              # close sub timing gaps < 210ms
blend-subtitles=yes             # blend subs into video frame; required for interpolation correctness
sub-ass-override=yes
demuxer-mkv-subtitle-preroll=yes
sub-file-paths=sub;subs;subtitles
sub-file-paths-append=subtitles

### Audio ###

volume-max=200
audio-file-auto=fuzzy
audio-pitch-correction=yes
audio-normalize-downmix=yes
audio-channels=7.1,5.1,stereo

## Audio Filters (uncomment to activate) ##

#af-toggle=@dynaudnorm:lavfi=[dynaudnorm=f=500:g=31:p=0.5:m=5:r=0.9]
#af-toggle=@loudnorm:lavfi=[loudnorm=I=-16:TP=-1.5:LRA=11]
#af-toggle=@loudnorm:lavfi=[loudnorm=I=-16:TP=-3:LRA=4]
#af-toggle=@dynaudnorm:lavfi=[dynaudnorm=g=5:f=250:r=0.9:p=0.5]
# boost speech clarity
#af=@normalize:speechnorm=e=10:r=0.0005:l=1

### Behaviour ###

osc=no
fs=yes
snap-window=yes                 # snap to screen edges in windowed mode
keep-open=yes
border=no
cursor-autohide=1000            # hide cursor after 1s of inactivity
save-position-on-quit=yes
watch-later-dir="~~/cache/watch_later"
gpu-shader-cache-dir="~~/cache/shaders_cache"

### OSD ###

osd-bar=no
osd-bold=yes
osd-font-size=37
osd-font='JetBrains Mono'
